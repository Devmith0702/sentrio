<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentrio</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      /* No scrollbars on the popup */
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Parcel entry point — resolves popup.jsx and bundles it -->
  <script src="popup.jsx" type="module"></script>
</body>
</html>
